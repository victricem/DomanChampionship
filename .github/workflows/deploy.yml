name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './mahjong-app/package-lock.json' # 👉 告訴它鎖定檔在子資料夾
          
      - name: Install dependencies
        run: npm install
        working-directory: ./mahjong-app  # 👉 指向子資料夾
        
      - name: Build
        run: npm run build
        working-directory: ./mahjong-app  # 👉 指向子資料夾
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './mahjong-app/dist'  # 👉 打包出來的 dist 也會在子資料夾裡
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4